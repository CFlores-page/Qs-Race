<!DOCTYPE html>
<html>
<head>
<style>
body {
  background:
    radial-gradient(circle at top, #1a1a1a, #000 70%),
    linear-gradient(to bottom, #000, #111);

  color: white;
  font-family: Arial;
  padding: 20px;
	}

.track {
  position: relative;
  height: 70px;
  margin: 16px 0;
  border-radius: 12px;
  overflow: hidden;

  background: #2b2b2b;

  border: 2px solid #444;
}

.track::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 200px;
  right: 0;                 /* 🔥 more reliable than calc */
  height: 3px;

  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 25px,
    transparent 25px,
    transparent 50px
  );

  transform: translateY(-50%);
  z-index: 1;               /* 🔥 ensure visibility */
}

.track:hover {
  background: #3a3a3a;
}

.track {
  box-shadow:
    inset 0 2px 5px rgba(0,0,0,0.8),
    inset 0 -2px 5px rgba(255,255,255,0.05);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

.car {
  position: absolute;
  top: 10px;
  height: 50px;
  width: auto;              /* 🔥 keeps aspect ratio */
  object-fit: contain;      /* prevents stretching */
  transition: left 0.8s ease-out;
  transform: translateY(-2px);
  z-index: 2;
}

.track.leader {
  box-shadow: 0 0 20px gold;
}

.driver-card {
  position: absolute;
  left: 45px;
  top: 8px;
  font-size: 13px;
  line-height: 1.2;
  z-index: 2;
}

.driver-name {
  font-weight: bold;
  font-size: 14px;
}

.driver-stats {
  font-size: 12px;
  color: #ccc;
}

.label {
  position: absolute;
  left: 10px;
  top: -18px;
  font-size: 14px;
  font-weight: bold;
}

.ghost {
  opacity: 0.35;
}

.finish {
  position: absolute;
  right: 0;
  width: 14px;
  height: 100%;

  background: repeating-linear-gradient(
    45deg,
    white 0px,
    white 12px,
    black 12px,
    black 24px
  );

  box-shadow: -3px 0 8px rgba(255, 255, 255, 0.4);
}

.site-badge {
  position: absolute;
  left: 8px;
  top: 50%;
  transform: translateY(-50%);

  width: 28px;
  height: 28px;
  border-radius: 50%;

  background: #111;
  border: 2px solid #777;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 10px;
  font-weight: bold;
  color: white;
  z-index: 3;
}

</style>
</head>

<body>

<h2>🏁 Arrivals Race</h2>
<div id="race"></div>

<script>
const DATA_URL = "https://opensheet.elk.sh/1_GrJOwPbZwKQlZWQrY0MlBVGtjOGuaIlbod6A4w5VmQ/SUMMARY";

const CARS = [
  "./images/race_car1.png",
  "./images/race_car2.png",
  "./images/race_car3.png",
  "./images/race_car4.png",
  "./images/race_car5.png",
  "./images/race_car6.png",
  "./images/race_car7.png",
  "./images/race_car8.png",
];

// stable car assignment
function getCarIndex(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return Math.abs(hash) % CARS.length;
}

async function loadRace() {
  const res = await fetch(DATA_URL);
  const data = await res.json();

  const map = {};

data.forEach(row => {
  const name = row.CLOSER ? row.CLOSER.trim() : "";
  const site = row.SITE ? row.SITE.trim() : "";
  const qs = Number(row.Qs) || 0;
  const forecast = Number(row.FORECAST) || 0;
  
  if (!name) return;

  if (!map[name]) {
    map[name] = { qs: 0, forecast: 0, site: site };
  }

  map[name].qs += qs;
  map[name].forecast += forecast;
});

const players = Object.entries(map)
  .map(([name, val]) => ({
    name,
    site: val.site,
    arrivals: val.qs,
    forecast: val.forecast,
    projected: val.qs + val.forecast
  }))
  .sort((a, b) => b.projected - a.projected);
    
    const race = document.getElementById("race");
    race.innerHTML = "";

    if (players.length === 0) {
    race.innerHTML = "<h3>No data</h3>";
    return;
    }

    const max = Math.max(players[0].projected, 1);

    players.forEach((p, index) => {

    const track = document.createElement("div");
    track.className = "track";

    if (index === 0) {
      track.style.boxShadow = "0 0 20px gold";
    }

    const realPercent = (p.arrivals / max) * 90;
    const ghostPercent = (p.projected / max) * 90;  
    const offset = (index % 3) * 2;

    // 👻 Ghost (TOTAL = Arrivals + Booked)
    const ghost = document.createElement("img");
    ghost.className = "car ghost";
    ghost.src = CARS[getCarIndex(p.name)];
    ghost.style.left = (ghostPercent + offset) + "%";
    ghost.style.top = (10 + (index % 2) * 5) + "px";

    // 🏎️ Real (ARRIVALS)
    let car = null;

    if (p.arrivals > 0) {
      car = document.createElement("img");
      car.className = "car";
      car.src = CARS[getCarIndex(p.name)];
      car.style.left = (realPercent + offset) + "%";
      car.style.top = (10 + (index % 2) * 5) + "px";
    }

    const siteBadge = document.createElement("div");
    siteBadge.className = "site-badge";
    siteBadge.innerText = p.site || "";

    // Driver card
    const card = document.createElement("div");
    card.className = "driver-card";

    const nameEl = document.createElement("div");
    nameEl.className = "driver-name";
    nameEl.innerText = p.name.toUpperCase();

    const statsEl = document.createElement("div");
    statsEl.className = "driver-stats";
    statsEl.innerText = `Arrivals: ${p.arrivals} | Forecast: ${p.forecast}`;

    card.appendChild(nameEl);
    card.appendChild(statsEl);

    // Finish line
    const finish = document.createElement("div");
    finish.className = "finish";

    // Append everything
    track.appendChild(siteBadge);
    track.appendChild(card);
    track.appendChild(ghost);

    if (car) {
      track.appendChild(car);
    }

    track.appendChild(finish);
    race.appendChild(track);
});
} 

// refresh every 30 seconds
setInterval(loadRace, 30000);
loadRace();</script>

</body>
</html>
